name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/growthpilot-api:$IMAGE_TAG -f docker/Dockerfile .
          docker push $ECR_REGISTRY/growthpilot-api:$IMAGE_TAG
          docker tag $ECR_REGISTRY/growthpilot-api:$IMAGE_TAG $ECR_REGISTRY/growthpilot-api:latest
          docker push $ECR_REGISTRY/growthpilot-api:latest

      - name: Build and push Celery image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/growthpilot-celery:$IMAGE_TAG -f docker/Dockerfile.celery .
          docker push $ECR_REGISTRY/growthpilot-celery:$IMAGE_TAG

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster growthpilot-prod --service growthpilot-api --force-new-deployment
          aws ecs update-service --cluster growthpilot-prod --service growthpilot-celery --force-new-deployment
