version: "3.9"

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: growthpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    command: python manage.py runserver 0.0.0.0:8000

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    env_file: ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app
    command: ["celery", "-A", "config.celery", "worker", "--loglevel=debug", "--concurrency=2"]
