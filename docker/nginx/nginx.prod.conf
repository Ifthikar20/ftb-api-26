worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream django {
        server web:8000;
    }

    # ── Redirect HTTP → HTTPS ──
    server {
        listen 80;
        server_name fetchbot.ai www.fetchbot.ai;
        return 301 https://$host$request_uri;
    }

    # ── Allow health checks over HTTP (internal) ──
    server {
        listen 80;
        server_name 100.31.135.211 localhost;

        location /health/ {
            proxy_pass http://django;
            proxy_set_header Host fetchbot.ai;
            proxy_set_header X-Forwarded-Proto https;
            access_log off;
        }

        location / {
            return 301 https://fetchbot.ai$request_uri;
        }
    }

    # ── HTTPS Server ──
    server {
        listen 443 ssl;
        server_name fetchbot.ai www.fetchbot.ai;

        ssl_certificate     /etc/nginx/ssl/fetchbot.ai.pem;
        ssl_certificate_key /etc/nginx/ssl/fetchbot.ai.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 20M;

        # ── Gzip Compression ──
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_comp_level 4;
        gzip_types
            text/plain
            text/css
            text/javascript
            application/javascript
            application/json
            application/xml
            image/svg+xml;

        # ── Security Headers ──
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Django Static Files ──
        location /static/ {
            alias /static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Health Check ──
        location /health/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            access_log off;
        }

        # ── Django Admin ──
        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── API Proxy ──
        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── WebSocket Proxy ──
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400;
        }

        # ── Pixel / Tracking JS (served to external websites) ──
        location /pixel/ {
            alias /etc/nginx/pixel/;
            types { application/javascript js; }
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Cache-Control "public, max-age=3600";
            access_log off;
        }

        # ── Vue SPA (catch-all — must be LAST) ──
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
} # end http
