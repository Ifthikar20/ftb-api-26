# LiveKit Server Configuration
# See: https://docs.livekit.io/realtime/self-hosting/deployment/

port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true

# Generate keys with: docker run --rm livekit/generate
keys:
  # Replace with your own keys in production
  devkey: secret

# SIP configuration for inbound phone calls
sip:
  # SIP port for receiving calls from Telnyx/Twilio SIP trunk
  sip_port: 5060

logging:
  level: info
