version: "3.9"

services:
  db:
    image: postgres:16-alpine
    env_file: ../.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-growthpilot}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --save 60 1000
    deploy:
      resources:
        limits:
          memory: 150M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    volumes:
      - frontend_dist:/app/dist

  openclaw:
    build:
      context: ../docker/openclaw
      dockerfile: Dockerfile.openclaw
    env_file: ../.env.prod
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_AUTH_TOKEN: ${OPENCLAW_AUTH_TOKEN:-fetchbot-openclaw-token}
    volumes:
      - openclaw_data:/home/user/.openclaw
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: "no"  # Disabled: OpenClaw gateway not yet functional, was crash-looping

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      OPENCLAW_GATEWAY_URL: http://openclaw:18789
      OPENCLAW_AUTH_TOKEN: ${OPENCLAW_AUTH_TOKEN:-fetchbot-openclaw-token}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 500M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    env_file: ../.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    command: >
      bash -c "
        celery -A config.celery worker
          --loglevel=info
          --concurrency=2
          --queues=default,high,low &
        celery -A config.celery beat
          --loglevel=info
          --scheduler=django_celery_beat.schedulers:DatabaseScheduler &
        wait
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: ["CMD-SHELL", "celery -A config.celery inspect ping --timeout 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/pixel:/etc/nginx/pixel:ro
      - static_files:/static:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - /opt/fetchbot/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - frontend
    deploy:
      resources:
        limits:
          memory: 50M
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
  frontend_dist:
  openclaw_data:
